version: "3.9"

services:
  bot:
    build: .
    container_name: tradewave-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
    volumes:
      - db-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('fs').accessSync('/app/data/tradewave.db')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
